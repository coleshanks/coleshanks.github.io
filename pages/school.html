<!DOCTYPE html>
<html lang="en-CA">
    <head>
        <meta charset="utf-8">
        <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
        <link rel="stylesheet" href="/assets/css/style.css" type="text/css">
        <title>School | Cole Shanks</title>
        <script defer src="/scripts/navbar.js"></script>
        <script src='https://kit.fontawesome.com/65ce51f689.js' crossorigin='anonymous'></script>
        <script src="/scripts/link_router.js" defer></script>
    </head>
    <body>
        <div>
            <ul class="navbar">
                <li class="nav_btn"><a href="/index.html" target="_self">Home</a></li>
                <li class="nav_btn"><a href="/pages/projects.html" target="_self">Projects</a></li>
                <li class="nav_btn"><a href="/pages/CV.html" target="_self">CV</a></li>
                <li class="nav_btn"><a href="/pages/explore.html" target="_self">Explore</a></li>
            </ul>
        </div>
        <div>
            <h1 style="font-size: 50px; text-align: center; background-image: url(/assets/images/space/space.jpeg);">School</h1>
        </div>
        <style>
            a:link, a:visited { color: white; }
            a:hover { color: var(--text_blue); }
            .nav_btn a:hover, .btn_on_page a:hover { color: var(--text_green); }
            .school-list {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                width: 80%;
                max-width: 80%;
                margin: 40px auto;
                padding: 0 10px;
            }
            .school-row {
                display: flex;
                align-items: center;
                background: #242930;
                border-radius: 8px;
                overflow: hidden;
                min-height: 120px;
                box-shadow: 4px 4px 8px rgba(69, 147, 250, 0.32);
            }
            .school-name {
                padding: 24px 28px;
                min-width: 120px;
            }
            .school-name h2 {
                margin: 0;
            }
            .school-name h2 a {
                color: var(--text_blue);
                text-decoration: none;
            }
            .school-name h2 a:hover {
                text-decoration: underline;
            }
            .school-desc {
                position: relative;
                padding: 24px 28px 24px 31px;
                color: var(--text_grey);
                font-size: 15px;
                flex: 1;
                align-self: stretch;
                display: flex;
                align-items: center;
            }
            .school-desc::before {
                content: '';
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 3px;
                background: var(--text_blue);
                border-radius: 2px;
            }
            @media (max-width: 900px) {
                .school-list {
                    width: 90%;
                    max-width: 90%;
                }
            }
            @media (max-width: 750px) {
                .school-list {
                    grid-template-columns: 1fr;
                    width: 100%;
                    max-width: 100%;
                    padding: 0 12px;
                }
            }
        </style>

        <div class="school-list">

            <div class="school-row">
                <div class="school-name">
                    <h2><a href="/pages/school/ubc.html" target="_self">UBC</a></h2>
                </div>
                <div class="school-desc">
                    Bachelor of Applied Science in Electrical Engineering, University of British Columbia.
                </div>
            </div>

            <div class="school-row">
                <div class="school-name">
                    <h2><a href="/pages/school/capu.html" target="_self">CapU</a></h2>
                </div>
                <div class="school-desc">
                    Pre-engineering studies at Capilano University before transferring to UBC.
                </div>
            </div>

            <div class="school-row">
                <div class="school-name">
                    <h2><a href="/pages/school/uoft.html" target="_self">UofT</a></h2>
                </div>
                <div class="school-desc">
                    Exchange year courses taken at the University of Toronto.
                </div>
            </div>

        </div>
    </body>
</html>
