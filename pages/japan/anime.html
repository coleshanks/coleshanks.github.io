<!DOCTYPE html>
<html lang="en-CA">
    <head>
        <meta charset="utf-8">
        <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
        <link rel="stylesheet" href="/assets/css/style.css" type="text/css">
        <link rel="stylesheet" href="/assets/css/japan.css" type="text/css">
        <style>
            .list {
                margin: 8px 30px;
                padding-left: 0;
                list-style: none;
                text-align: left;
                color: var(--text_grey);
            }
            .list li {
                display: flex;
                align-items: flex-start;
                gap: 20px;
                margin: 18px 0;
            }
            .game-poster {
                width: 130px;
                flex-shrink: 0;
                border-radius: 3px;
                overflow: hidden;
                border: 1px solid #3a3f48;
            }
            .game-poster img {
                width: 100%;
                height: auto;
                display: block;
            }
            .game-info {
                display: flex;
                flex-direction: column;
                gap: 4px;
                padding-top: 4px;
            }
            .game-label {
                color: var(--text_orange);
                font-size: 0.75em;
                letter-spacing: 0.05em;
                font-family: 'Roboto', sans-serif;
            }
            .game-title {
                color: var(--text_cyan);
                font-size: 1.05em;
                font-family: 'Roboto', sans-serif;
                font-weight: bold;
            }
            .game-year {
                font-size: 0.8em;
                font-weight: normal;
                color: #555588;
                margin-left: 6px;
            }
        </style>
        <title>Anime | Cole Shanks</title>
    </head>
    <body style="margin-bottom: 20px; background-size: cover; padding-top: 80px;">
        <button class="back-to-main"><a href="/pages/japan/immersion.html" target="_self">back</a></button>
        <h1 style="font-size: 50px; color: var(--text_cyan);">anime</h1>

        <ul class="list">
            <li>
                <div class="game-poster"><img src="/assets/images/immersion/anime/monogatari.webp" alt="物語シリーズ"></div>
                <div class="game-info">
                    <span class="game-label">西尾維新</span>
                    <span class="game-title">物語シリーズ <span class="game-year">2009</span></span>
                </div>
            </li>
        </ul>
    </body>
</html>
