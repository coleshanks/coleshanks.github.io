<!DOCTYPE html>
<html lang="en-CA">
    <head>
        <meta charset="utf-8">
        <link rel="icon" type="image/png" href="/assets/favicon/SamusAranFront.png">
        <link rel="stylesheet" href="/assets/css/style.css" type="text/css">
        <link rel="stylesheet" href="/assets/css/japan.css" type="text/css">
        <style>
            .list {
                margin: 8px 30px;
                padding-left: 0;
                list-style: none;
                text-align: left;
                color: var(--text_grey);
            }
            .list li {
                display: flex;
                align-items: flex-start;
                gap: 20px;
                margin: 18px 0;
            }
            .list li:has(.done) .game-info {
                color: var(--text_green);
            }
            .list li[data-date]:not([data-date=""]) .game-info {
                color: var(--text_green);
            }
            .done {
                font-size: 0.82em;
                opacity: 0.5;
                margin-left: 6px;
            }
            .game-poster {
                width: 130px;
                flex-shrink: 0;
                border-radius: 3px;
                overflow: hidden;
                border: 1px solid #3a3f48;
            }
            .game-poster img {
                width: 100%;
                height: auto;
                display: block;
            }
            .game-info {
                display: flex;
                flex-direction: column;
                gap: 4px;
                padding-top: 4px;
            }
            .game-label {
                color: var(--text_orange);
                font-size: 0.75em;
                letter-spacing: 0.05em;
                font-family: 'Roboto', sans-serif;
            }
            .game-title {
                font-size: 1.05em;
                font-family: 'Roboto', sans-serif;
                font-weight: bold;
            }
            .game-year {
                font-size: 0.8em;
                font-weight: normal;
                color: #555588;
                margin-left: 6px;
            }
            .game-desc {
                font-size: 0.88em;
                line-height: 1.6em;
                margin-top: 4px;
                color: var(--text_grey);
                opacity: 0.85;
            }
            .list li:has(.done) .game-desc {
                color: var(--text_grey);
                opacity: 0.85;
            }
        </style>
        <title>Games | Cole Shanks</title>
    </head>
    <body style="margin-bottom: 20px; background-size: cover; padding-top: 80px;">
        <button class="back-to-main"><a href="/pages/japan.html" target="_self">back</a></button>
        <h1 style="font-size: 50px;">games <img src="/assets/images/games/sprites/metroid/SamusBall.gif" alt="morph ball" style="image-rendering: pixelated; transform: scale(2); transform-origin: left center; vertical-align: middle;"></h1>

        <ul class="list">
            <li data-date="">
                <div class="game-poster"><img src="/assets/images/games/Final Fantasy VII International (Japan).jpg" alt="Final Fantasy VII"></div>
                <div class="game-info">
                    <span class="game-label">PLAYSTATION</span>
                    <span class="game-title">Final Fantasy VII <span class="game-year">1997</span><span class="done">済</span></span>
                </div>
            </li>
            <li data-date="">
                <div class="game-poster"><img src="/assets/images/games/Chrono Trigger (Japan).jpg" alt="Chrono Trigger"></div>
                <div class="game-info">
                    <span class="game-label">SUPER FAMICOM</span>
                    <span class="game-title">Chrono Trigger <span class="game-year">1995</span></span>
                </div>
            </li>
        </ul>

    </body>
</html>
