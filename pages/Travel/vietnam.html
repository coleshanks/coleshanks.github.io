        <style>
            .gallery {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                max-width: 93%;
                margin: 20px auto;
                padding: 0 10px;
            }
            .gallery-item {
                border-radius: 8px;
                overflow: hidden;
                background: #242930;
            }
            .gallery-item img {
                width: 100%;
                aspect-ratio: 4/3;
                object-fit: cover;
                display: block;
                border-radius: 8px;
            }
            @media (max-width: 1100px) {
                .gallery {
                    grid-template-columns: repeat(3, 1fr);
                }
            }
            @media (max-width: 750px) {
                .gallery {
                    grid-template-columns: repeat(2, 1fr);
                }
            }
            @media (max-width: 450px) {
                .gallery {
                    grid-template-columns: 1fr;
                }
            }
        </style>
