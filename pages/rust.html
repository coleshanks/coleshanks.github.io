<!DOCTYPE html>
<html lang="en-CA">
    <head>
        <meta charset="utf-8">
        <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
        <link rel="stylesheet" href="/assets/css/style.css" type="text/css">
        <title>Rust 🦀 | Cole Shanks</title>
        <!--Scripts-->
        <script defer src="/scripts/navbar.js"></script>
        <script src='https://kit.fontawesome.com/65ce51f689.js' crossorigin='anonymous'></script>
        <script src="/scripts/link_router.js" defer></script>
        <style>
            /* Orange overrides */
            h2 {
                color: var(--text_orange);
            }
            hr {
                border-color: var(--text_orange);
            }
            a:hover {
                color: var(--text_orange);
            }
            .nav_btn a:hover,
            .btn_on_page a:hover {
                color: var(--text_green);
            }

            .rust-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
                width: 80%;
                max-width: 80%;
                margin: 40px auto;
                padding: 0 10px;
                box-sizing: border-box;
            }
            .rust-row {
                display: flex;
                align-items: center;
                background: #242930;
                border-radius: 8px;
                overflow: hidden;
                min-height: 100px;
                box-shadow: 4px 4px 8px rgba(250, 125, 69, 0.32);
            }
            .rust-name {
                padding: 18px 24px;
                min-width: 200px;
            }
            .rust-name h2 {
                margin: 0;
            }
            .rust-name h2 a {
                color: var(--text_orange);
                text-decoration: none;
            }
            .rust-name h2 a:hover {
                text-decoration: underline;
            }
            .rust-desc {
                position: relative;
                padding: 18px 24px 18px 27px;
                color: var(--text_grey);
                font-size: 15px;
                flex: 1;
                align-self: stretch;
                display: flex;
                align-items: center;
            }
            .rust-desc::before {
                content: '';
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 3px;
                background: var(--text_orange);
                border-radius: 2px;
            }
            .section-header {
                width: 80%;
                margin: 48px auto 0;
                padding: 0 10px;
                box-sizing: border-box;
            }
            .section-header h2 {
                margin: 0 0 8px 0;
            }
            .section-header hr {
                margin: 0;
                width: 100%;
            }
            .playground-block {
                margin: 32px auto;
                width: 80%;
                border-radius: 8px;
                overflow: hidden;
                background: #0d1117;
                border: 1px solid #30363d;
            }
            .playground-header {
                padding: 10px 16px;
                font-family: 'Fira Mono', 'Courier New', monospace;
                font-size: 14px;
                color: var(--text_orange);
                background: #161b22;
                border-bottom: 1px solid #30363d;
                display: flex;
                align-items: center;
                gap: 8px;
                user-select: none;
            }
            .playground-block iframe {
                width: 100%;
                height: 550px;
                border: none;
                display: block;
            }
            @media (max-width: 900px) {
                .rust-list,
                .section-header,
                .playground-block {
                    width: 90%;
                    max-width: 90%;
                }
            }
            @media (max-width: 750px) {
                .rust-list {
                    width: 100%;
                    max-width: 100%;
                    padding: 0 12px;
                }
                .section-header,
                .playground-block {
                    width: 100%;
                    max-width: 100%;
                    padding: 0;
                }
                .playground-block iframe {
                    height: 480px;
                }
            }
        </style>
    </head>
    <body>
        <div>
            <ul class="navbar">
                <li class="nav_btn"><a href="/index.html" target="_self">Home</a></li>
                <li class="btn_on_page"><a href="/pages/projects.html" target="_self">Projects</a></li>
                <li class="nav_btn"><a href="/pages/CV.html" target="_self">CV</a></li>
                <li class="nav_btn"><a href="/pages/explore.html" target="_self">Explore</a></li>
            </ul>
        </div>
        <div>
            <h1 style="font-size: 50px; text-align: center; background-image: url(/assets/images/space/space.jpeg); color: var(--text_orange);">Rust 🦀</h1>
        </div>

        <div class="rust-list">
            <div class="rust-row">
                <div class="rust-name"><h2><a href="#">Project One</a></h2></div>
                <div class="rust-desc">Description.</div>
            </div>
            <div class="rust-row">
                <div class="rust-name"><h2><a href="#">Project Two</a></h2></div>
                <div class="rust-desc">Description.</div>
            </div>
        </div>

        <div class="section-header" style="width: 80%; margin: 48px auto 0;">
            <h2>Playground</h2>
            <hr>
        </div>

        <div class="playground-block">
            <div class="playground-header">🦀 run it yourself</div>
            <iframe
                src="https://play.rust-lang.org/?version=stable&mode=debug&edition=2024&gist=9a73cb1155622e4f5823a31fce337592"
                title="Rust Playground"
                allow="clipboard-write"
                loading="lazy">
            </iframe>
        </div>

        <div style="height: 40px;"></div>
    </body>
</html>
