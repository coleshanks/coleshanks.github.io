        <style>
            .japan-list {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                width: 80%;
                max-width: 80%;
                margin: 40px auto;
                padding: 0 10px;
                box-sizing: border-box;
            }
            .japan-row {
                display: flex;
                align-items: stretch;
                background: #242930;
                border-radius: 8px;
                overflow: hidden;
                min-height: 100px;
                box-shadow: 4px 4px 8px rgba(112, 112, 240, 0.32);
            }
            .japan-name {
                flex: 1;
                padding: 18px 24px;
                display: flex;
                align-items: center;
            }
            .japan-name h2 {
                margin: 0;
            }
            .japan-name h2 a {
                color: var(--text_purple);
                text-decoration: none;
            }
            .japan-name h2 a:hover {
                text-decoration: underline;
            }
            .japan-desc {
                border-left: 3px solid var(--text_purple);
                padding: 18px 24px;
                color: var(--text_grey);
                font-size: 15px;
                width: 50%;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
            }
            @media (max-width: 900px) {
                .japan-list {
                    width: 90%;
                    max-width: 90%;
                }
            }
            @media (max-width: 750px) {
                .japan-list {
                    grid-template-columns: 1fr;
                    width: 100%;
                    max-width: 100%;
                    padding: 0 12px;
                }
            }
        </style>
    </head>
