<!DOCTYPE html>
<html lang="en-CA">
    <head>
        <meta charset="utf-8">
        <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
        <link rel="stylesheet" href="/assets/css/style.css" type="text/css">
        <title>ネット | Cole Shanks</title>
        <script defer src="/scripts/navbar.js"></script>
        <script src='https://kit.fontawesome.com/65ce51f689.js' crossorigin='anonymous'></script>
        <script src="/scripts/link_router.js" defer></script>
        <style>
            .net-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 60vh;
                gap: 24px;
                margin-top: 48px;
            }
            .net-btn {
                background: #242930;
                color: var(--text_green);
                border: 2px solid var(--text_green);
                border-radius: 6px;
                font-family: 'Roboto', sans-serif;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s, color 0.2s;
            }
            .net-btn:hover:not(:disabled) {
                background: var(--text_green);
                color: #0a0a0f;
            }
            .net-btn:disabled {
                opacity: 0.3;
                cursor: default;
            }
            #random-btn {
                font-size: 22px;
                padding: 18px 48px;
                letter-spacing: 0.04em;
            }
            #player-container {
                display: none;
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }
            .yt-wrapper {
                position: relative;
                width: 854px;
                height: 480px;
                overflow: hidden;
            }
            .yt-wrapper iframe {
                position: absolute;
                top: -65px;
                left: 0;
            }
            #yt-intercept {
                position: absolute;
                inset: 0;
                z-index: 10;
                cursor: pointer;
            }
            .player-controls {
                display: flex;
                gap: 12px;
                align-items: center;
            }
            .player-controls .net-btn {
                font-size: 16px;
                padding: 10px 32px;
            }
            #fullscreen-btn {
                padding: 10px 18px;
            }
            #yt-link-btn {
                padding: 10px 18px;
                font-size: 18px;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
            }
            #seek-bar {
                width: 854px;
                height: 4px;
                appearance: none;
                -webkit-appearance: none;
                background: #353b43;
                border-radius: 2px;
                cursor: pointer;
                outline: none;
            }
            #seek-bar::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: var(--text_green);
                cursor: pointer;
            }
            #seek-bar::-moz-range-thumb {
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: var(--text_green);
                cursor: pointer;
                border: none;
            }
            .yt-wrapper:fullscreen,
            .yt-wrapper:-webkit-full-screen {
                width: 100vw !important;
                height: 100vh !important;
                background: black;
            }
            .yt-wrapper:fullscreen iframe,
            .yt-wrapper:-webkit-full-screen iframe {
                width: 100vw !important;
                height: calc(100vh + 130px) !important;
                top: -65px !important;
            }
        </style>
    </head>
    <body>
        <button class="back-to-main"><a href="/pages/Extras.html" target="_self">back</a></button>
        <div>
            <ul class="navbar">
                <li class="nav_btn"><a href="/index.html" target="_self">Home</a></li>
                <li class="nav_btn"><a href="/pages/projects.html" target="_self">Projects</a></li>
                <li class="nav_btn"><a href="/pages/CV.html" target="_self">CV</a></li>
                <li class="nav_btn"><a href="/pages/explore.html" target="_self">Explore</a></li>
            </ul>
        </div>
        <div>
            <h1 style="font-size: 50px; text-align: center; background-image: url(/assets/images/space/space.jpeg);">ネット</h1>
        </div>

        <div class="net-container">
            <div id="btn-container">
                <button id="random-btn" class="net-btn">▶ 再生</button>
            </div>
            <div id="player-container">
                <div class="yt-wrapper">
                    <div id="yt-player"></div>
                    <div id="yt-intercept"></div>
                </div>
                <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
                <div class="player-controls">
                    <button id="prev-btn" class="net-btn" disabled>← 前へ</button>
                    <button id="playpause-btn" class="net-btn">II</button>
                    <button id="next-btn" class="net-btn">次へ →</button>
                    <button id="fullscreen-btn" class="net-btn"><i class="fa-solid fa-expand"></i></button>
                    <a id="yt-link-btn" class="net-btn" href="#" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>
        </div>

        <script>
            let player = null;
            let ytReady = false;
            let pendingVideoId = null;
            let currentVideoId = null;
            let queue = [];
            let queueIndex = 0;
            let history = [];
            let historyIndex = -1;

            function extractId(url) {
                const m = url.match(/(?:v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
                return m ? m[1] : null;
            }

            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function nextFromQueue() {
                if (!queue.length) return null;
                if (queueIndex >= queue.length) {
                    shuffle(queue);
                    queueIndex = 0;
                    return null;
                }
                return queue[queueIndex++];
            }

            function updateControls() {
                document.getElementById('prev-btn').disabled = historyIndex <= 0;
            }

            function playVideo(videoId) {
                currentVideoId = videoId;
                document.getElementById('yt-link-btn').href = 'https://www.youtube.com/watch?v=' + videoId;
                if (player) {
                    player.loadVideoById(videoId);
                } else if (ytReady) {
                    createPlayer(videoId);
                } else {
                    pendingVideoId = videoId;
                }
                updateControls();
            }

            function goNext() {
                let id;
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    id = history[historyIndex];
                } else {
                    id = nextFromQueue();
                    if (!id) return;
                    history = history.slice(0, historyIndex + 1);
                    history.push(id);
                    historyIndex = history.length - 1;
                }
                playVideo(id);
            }

            function goPrev() {
                if (historyIndex <= 0) return;
                historyIndex--;
                playVideo(history[historyIndex]);
            }

            function showPlayer(videoId) {
                history.push(videoId);
                historyIndex = history.length - 1;
                document.getElementById('btn-container').style.display = 'none';
                document.getElementById('player-container').style.display = 'flex';
                playVideo(videoId);
            }

            function showButton() {
                document.getElementById('player-container').style.display = 'none';
                document.getElementById('btn-container').style.display = 'block';
                history = [];
                historyIndex = -1;
                if (player) player.stopVideo();
            }

            function createPlayer(videoId) {
                player = new YT.Player('yt-player', {
                    width: '854',
                    height: '610',
                    videoId: videoId,
                    playerVars: { autoplay: 1, rel: 0, controls: 0, iv_load_policy: 3 },
                    events: {
                        onStateChange: function(e) {
                            if (e.data === YT.PlayerState.PLAYING) startProgressUpdate();
                            if (e.data === YT.PlayerState.ENDED) {
                                const next = nextFromQueue();
                                if (next) {
                                    history = history.slice(0, historyIndex + 1);
                                    history.push(next);
                                    historyIndex = history.length - 1;
                                    playVideo(next);
                                } else {
                                    showButton();
                                }
                            }
                            const btn = document.getElementById('playpause-btn');
                            if (btn) btn.textContent = e.data === YT.PlayerState.PLAYING ? 'II' : '▶';
                        }
                    }
                });
            }

            window.onYouTubeIframeAPIReady = function() {
                ytReady = true;
                if (pendingVideoId) {
                    createPlayer(pendingVideoId);
                    pendingVideoId = null;
                }
            };

            document.getElementById('random-btn').addEventListener('click', function() {
                const id = nextFromQueue();
                if (id) showPlayer(id);
            });

            document.getElementById('next-btn').addEventListener('click', goNext);
            document.getElementById('prev-btn').addEventListener('click', goPrev);
            function togglePlayPause() {
                if (!player) return;
                if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            }

            document.getElementById('playpause-btn').addEventListener('click', togglePlayPause);
            document.getElementById('yt-intercept').addEventListener('click', togglePlayPause);

            // seek bar
            let seekInterval = null;
            let isSeeking = false;
            const seekBar = document.getElementById('seek-bar');

            function startProgressUpdate() {
                clearInterval(seekInterval);
                seekInterval = setInterval(() => {
                    if (!player || isSeeking) return;
                    const dur = player.getDuration();
                    if (dur > 0) {
                        const pct = (player.getCurrentTime() / dur) * 100;
                        seekBar.value = pct;
                        seekBar.style.background = `linear-gradient(to right, var(--text_green) ${pct}%, #353b43 ${pct}%)`;
                    }
                }, 500);
            }

            seekBar.addEventListener('mousedown', () => { isSeeking = true; });
            seekBar.addEventListener('input', function() {
                const pct = this.value;
                this.style.background = `linear-gradient(to right, var(--text_green) ${pct}%, #353b43 ${pct}%)`;
            });
            seekBar.addEventListener('change', function() {
                if (!player) return;
                player.seekTo((this.value / 100) * player.getDuration(), true);
                isSeeking = false;
            });

            // fullscreen
            const fsBtn = document.getElementById('fullscreen-btn');
            const ytWrapper = document.querySelector('.yt-wrapper');

            fsBtn.addEventListener('click', function() {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    ytWrapper.requestFullscreen();
                }
            });

            document.addEventListener('fullscreenchange', function() {
                const icon = fsBtn.querySelector('i');
                if (document.fullscreenElement) {
                    icon.classList.replace('fa-expand', 'fa-compress');
                } else {
                    icon.classList.replace('fa-compress', 'fa-expand');
                }
            });

            fetch('/assets/data/net.json', { cache: 'no-store' })
                .then(r => r.json())
                .then(data => {
                    queue = shuffle(data.map(extractId).filter(Boolean));
                    queueIndex = 0;
                })
                .catch(() => {});

            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(tag);

        </script>
    </body>
</html>
